<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Promise Methods: Recruitment Analogy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div id="app" class="h-screen flex flex-col items-center justify-center p-4 md:p-8">
        <!-- Progress Header -->
        <div class="fixed top-0 left-0 w-full p-4 flex gap-2 z-10">
            <template id="progress-dots"></template>
        </div>

        <!-- Content Area -->
        <main id="main-content" class="w-full max-w-4xl flex-1 flex flex-col justify-center slide-enter">
            <!-- Dynamic Content Injected Here -->
        </main>

        <!-- Navigation Controls -->
        <nav class="w-full max-w-4xl flex justify-between items-center py-6">
            <button id="prev-btn" class="px-6 py-2 rounded-full border border-slate-700 hover:bg-slate-800 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                Back
            </button>
            <div id="step-counter" class="text-slate-400 font-mono text-sm"></div>
            <button id="next-btn" class="px-8 py-2 rounded-full bg-blue-600 hover:bg-blue-500 font-bold transition-all shadow-lg shadow-blue-900/20">
                Next
            </button>
        </nav>
    </div>

    <script src="main.js"></script>
</body>
</html>
